<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <h2>Abang None Team</h2>
</div>

<div id="sideMenu" class="side-menu">
    <a href="home.html">Home</a>
    <a href="product.html">Product</a>
    <a href="cart.html">Cart</a>
</div>

<div class="container">
    <h1>Our Products</h1>

    <div id="product-list"></div>

    <a href="cart.html" class="checkout-btn">View Cart</a>
</div>

<audio id="bgm" loop muted>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()" class="btn">
    Play Music 🎵
</button>

<script>
const products = [
    {id:1, nama:"Es Selendang Mayang", harga:7000, gambar:"selendangM.jpg"},
    {id:2, nama:"Es 'COCO' Mayang", harga:9000, gambar:"selendangMK.png"}
];

const container = document.getElementById("product-list");

products.forEach(p => {
    container.innerHTML += `
        <div class="card">
            <img src="gambar/${p.gambar}">
            <h3>${p.nama}</h3>
            <p>Rp ${p.harga}</p>
            <button onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
    `;
});

function addToCart(id){
    let cart = JSON.parse(localStorage.getItem("cart")) || {};

    if(cart[id]){
        cart[id]++;
    } else {
        cart[id] = 1;
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart!");
}
</script>

<script src="script.js"></script>

<a href="secret.html" class="secret-btn">?</a>

</body>
</html>
